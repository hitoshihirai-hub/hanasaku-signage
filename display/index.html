<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなで咲かす未来の街</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/display.css?v=28">
</head>
<body>
  <div class="stage" id="stage">

    <!-- 背景 SVG（Sakana風：ほぼ白の余白＋線画の街）
         屋外サイネージ向けに、線は視認できる濃さ・太さにしている。
         大阪城・通天閣は「識別マーク」として濃く（花の輪郭と同じ #6E5A46）、
         一般の街並みは一段淡く（背景として後退させる）。 -->
    <svg class="scene" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice" aria-hidden="true">

      <!-- ほぼ白の地（わずかに暖色） -->
      <rect x="0" y="0" width="1080" height="1920" fill="#FCFBF7"/>

      <!-- 太陽（細い輪郭のみ） -->
      <circle cx="866" cy="298" r="96" fill="none" stroke="#E4DAC2" stroke-width="4"/>

      <!-- 余白に点在する花びら（線画のみ）。
           Sakana のページで白地に小さな魚が散っているのと同じ役割で、
           何も無い上半分が「殺風景」に見えるのを防ぐ。
           vector-effect で拡大しても線の太さを一定に保つ。 -->
      <g class="drift-petals" fill="none" stroke="#DCD5C4" stroke-width="2.2"
         stroke-linejoin="round" vector-effect="non-scaling-stroke">
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(150,430) rotate(-20) scale(1.7)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(336,352) rotate(34) scale(1.2)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(523,470) rotate(-52) scale(2.0)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(762,381) rotate(14) scale(1.4)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(944,524) rotate(-31) scale(1.8)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(92,648) rotate(61) scale(1.3)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(423,706) rotate(-16) scale(1.9)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(681,624) rotate(46) scale(1.2)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(884,764) rotate(-62) scale(1.5)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(224,866) rotate(24) scale(1.6)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(566,902) rotate(-41) scale(1.3)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(982,948) rotate(9) scale(1.45)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(362,1062) rotate(-26) scale(1.5)"/>
        <path d="M0,0 C-5,-3 -6,-12 0,-16 C6,-12 5,-3 0,0 Z" transform="translate(742,1034) rotate(51) scale(1.2)"/>
      </g>

      <!-- 街並み一式（地平線・一般ビル・大阪城・通天閣）。
           画面下端近くに配置するためまとめて下へ平行移動する。
           背景スカイライン画像を使うときは、この街だけを隠して差し替える
           （点在する花びら・太陽は残す）。 -->
      <g class="cityline" transform="translate(0,98)">

        <!-- ══ 観覧車（左）ハブ・スポーク・ゴンドラ・支柱 ══ -->
        <g class="landmark landmark-wheel"
           fill="none" stroke="#6E5A46" stroke-width="3"
           stroke-linejoin="round" stroke-linecap="round">
          <!-- 支柱 -->
          <path d="M74,1602 L124,1494"/>
          <path d="M174,1602 L124,1494"/>
          <path d="M92,1560 L156,1560"/>
          <!-- リム（外周・内周） -->
          <circle cx="124" cy="1494" r="78"/>
          <circle cx="124" cy="1494" r="66"/>
          <circle cx="124" cy="1494" r="7"/>
          <!-- スポーク（12本） -->
          <g stroke-width="1.6">
            <path d="M124,1428 L124,1560"/>
            <path d="M58,1494 L190,1494"/>
            <path d="M77,1447 L171,1541"/>
            <path d="M171,1447 L77,1541"/>
            <path d="M91,1437 L157,1551"/>
            <path d="M157,1437 L91,1551"/>
            <path d="M67,1461 L181,1527"/>
            <path d="M181,1461 L67,1527"/>
          </g>
          <!-- ゴンドラ（外周上に8つ） -->
          <g stroke-width="2.2">
            <circle cx="124" cy="1416" r="9"/>
            <circle cx="124" cy="1572" r="9"/>
            <circle cx="46"  cy="1494" r="9"/>
            <circle cx="202" cy="1494" r="9"/>
            <circle cx="69"  cy="1439" r="9"/>
            <circle cx="179" cy="1549" r="9"/>
            <circle cx="179" cy="1439" r="9"/>
            <circle cx="69"  cy="1549" r="9"/>
          </g>
        </g>

        <!-- ══ ビル群（中央）── 高さ・幅に変化をつけた線画 ══ -->
        <g fill="none" stroke="#8C8168" stroke-width="2.6"
           stroke-linejoin="round" stroke-linecap="round">
          <!-- 低層 -->
          <path d="M236,1602 L236,1500 L292,1500 L292,1602"/>
          <!-- 高層（アンテナ付き） -->
          <path d="M302,1602 L302,1448 L350,1448 L350,1602"/>
          <path d="M326,1448 L326,1424"/>
          <!-- 中層 -->
          <path d="M360,1602 L360,1518 L414,1518 L414,1602"/>
          <!-- 最高層 -->
          <path d="M424,1602 L424,1418 L470,1418 L470,1602"/>
          <!-- 台形の塔屋 -->
          <path d="M480,1602 L480,1486 L500,1462 L524,1462 L544,1486 L544,1602"/>
          <!-- 中層 -->
          <path d="M554,1602 L554,1512 L604,1512 L604,1602"/>
          <!-- 窓（細線・控えめ） -->
          <g stroke-width="1.4">
            <path d="M250,1520 L278,1520"/><path d="M250,1544 L278,1544"/><path d="M250,1568 L278,1568"/>
            <path d="M314,1470 L338,1470"/><path d="M314,1494 L338,1494"/>
            <path d="M314,1518 L338,1518"/><path d="M314,1542 L338,1542"/><path d="M314,1566 L338,1566"/>
            <path d="M372,1538 L402,1538"/><path d="M372,1562 L402,1562"/>
            <path d="M436,1440 L458,1440"/><path d="M436,1464 L458,1464"/>
            <path d="M436,1488 L458,1488"/><path d="M436,1512 L458,1512"/>
            <path d="M436,1536 L458,1536"/><path d="M436,1560 L458,1560"/>
            <path d="M566,1534 L592,1534"/><path d="M566,1558 L592,1558"/>
          </g>
        </g>

        <!-- ══ 大阪城（線画・参考準拠：石垣＋4層天守＋千鳥破風＋鯱）
             ※実在建造物の構造に基づく自作線画（ストック素材の複製ではない） ══ -->
        <g class="landmark landmark-castle"
           transform="translate(535,0) translate(205,1602) scale(1.75) translate(-205,-1602)"
           fill="none" stroke="#6E5A46" stroke-width="2"
           stroke-linejoin="round" stroke-linecap="round">
          <!-- 石垣（末広がり） -->
          <path d="M148,1602 L172,1556 L238,1556 L262,1602"/>

          <!-- 1層目：壁＋入母屋屋根＋千鳥破風 -->
          <rect x="176" y="1540" width="58" height="16"/>
          <path d="M160,1540 L182,1524 L228,1524 L246,1540"/>
          <path d="M197,1540 L205,1527 L213,1540"/>

          <!-- 2層目 -->
          <rect x="182" y="1510" width="46" height="14"/>
          <path d="M168,1510 L187,1496 L223,1496 L242,1510"/>
          <path d="M198,1510 L205,1499 L212,1510"/>

          <!-- 3層目 -->
          <rect x="187" y="1483" width="36" height="13"/>
          <path d="M176,1483 L192,1470 L218,1470 L234,1483"/>
          <path d="M199,1483 L205,1474 L211,1483"/>

          <!-- 最上層（金の間）＋入母屋屋根 -->
          <rect x="192" y="1457" width="26" height="13"/>
          <path d="M182,1457 L196,1440 L214,1440 L228,1457"/>
          <path d="M200,1457 L205,1450 L210,1457"/>
          <!-- 金の鯱（大棟の両端） -->
          <path d="M196,1440 q-3,-5 -1,-9 q3,2 4,5"/>
          <path d="M214,1440 q3,-5 1,-9 q-3,2 -4,5"/>

          <!-- 窓・格子（細め。親を1.9倍しているので線幅は割り戻す） -->
          <g stroke-width="1.1">
            <rect x="184" y="1544" width="7" height="8"/>
            <rect x="201" y="1544" width="7" height="8"/>
            <rect x="218" y="1544" width="7" height="8"/>
            <rect x="190" y="1514" width="6" height="7"/>
            <rect x="214" y="1514" width="6" height="7"/>
            <rect x="199" y="1486" width="12" height="7"/>
            <rect x="200" y="1460" width="10" height="7"/>
          </g>
        </g>

        <!-- ══ 通天閣（線画・忠実デフォルメ：シルエット参考）
             エッフェル塔型の開脚アーチ＋X字トラス＋主展望台＋王冠(ランタン)＋尖塔 ══ -->
        <g class="landmark landmark-tower"
           transform="translate(112,0) translate(880,1602) scale(1.5) translate(-880,-1602)"
           fill="none" stroke="#6E5A46" stroke-width="2.1"
           stroke-linejoin="round" stroke-linecap="round">
          <!-- 脚部：外脚＋内脚＋中央アーチ（末広がりに開く） -->
          <path d="M835,1602 L858,1548"/>
          <path d="M925,1602 L902,1548"/>
          <path d="M863,1602 L867,1548"/>
          <path d="M897,1602 L893,1548"/>
          <path d="M863,1602 Q880,1574 897,1602"/>
          <path d="M858,1548 L902,1548"/>
          <!-- 下段胴体：テーパー側面＋X字トラス（内部トラスは細め） -->
          <path d="M858,1548 L866,1460"/>
          <path d="M902,1548 L894,1460"/>
          <path d="M862,1504 L898,1504"/>
          <path d="M866,1460 L894,1460"/>
          <g stroke-width="1.3">
            <path d="M858,1548 L898,1504"/>
            <path d="M902,1548 L862,1504"/>
            <path d="M862,1504 L894,1460"/>
            <path d="M898,1504 L866,1460"/>
          </g>
          <!-- 主展望台（張り出した横帯） -->
          <rect x="856" y="1444" width="48" height="16"/>
          <!-- 首部（くびれ） -->
          <path d="M868,1444 L872,1416"/>
          <path d="M892,1444 L888,1416"/>
          <path d="M872,1416 L888,1416"/>
          <!-- 王冠（ランタン型の台形展望塔）＋縦筋 -->
          <path d="M870,1416 L874,1398 L886,1398 L890,1416 Z"/>
          <g stroke-width="1.3">
            <path d="M878,1416 L879,1398"/>
            <path d="M882,1416 L881,1398"/>
          </g>
          <!-- 頂部の小さな笠 -->
          <path d="M876,1398 L876,1392 L884,1392 L884,1398"/>
          <!-- 尖塔・アンテナ -->
          <path d="M880,1392 L880,1360"/>
        </g>

        <!-- 地平線（細い1本） -->
        <line x1="0" y1="1602" x2="1080" y2="1602" stroke="#D6D0C0" stroke-width="2"/>
      </g>
    </svg>

    <!-- 花レイヤー（SVG。動的に花を追加） -->
    <svg class="flowers" id="flowers-layer" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <!-- 花びら用グラデーション（中心=明るい、外縁=暗い）-->
        <radialGradient id="fg-pink"   cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFEAF3"/><stop offset="100%" stop-color="#C0356A"/></radialGradient>
        <radialGradient id="fg-yellow" cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFFBD0"/><stop offset="100%" stop-color="#C08010"/></radialGradient>
        <radialGradient id="fg-white"  cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFFFFF"/><stop offset="100%" stop-color="#C8A860"/></radialGradient>
        <radialGradient id="fg-purple" cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#F2E6FF"/><stop offset="100%" stop-color="#6030A8"/></radialGradient>
        <radialGradient id="fg-red"    cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFE0D8"/><stop offset="100%" stop-color="#A81818"/></radialGradient>
        <!-- 花芯用グラデーション -->
        <radialGradient id="fg-center" cx="40%" cy="35%" r="70%"><stop offset="0%"   stop-color="#FFFCC0"/><stop offset="70%"  stop-color="#E8C020"/><stop offset="100%" stop-color="#A07010"/></radialGradient>
        <!-- 花びら内側の光沢ライン（白半透明） -->
        <linearGradient id="fg-shine"  x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
      </defs>
      <g id="flowers-root"></g>
    </svg>

    <!-- カウンタ -->
    <header class="counter" id="counter">
      <div class="counter__title">みんなで咲かす未来の街</div>
      <div class="counter__row">
        <div class="counter__cell">
          <div class="counter__label">本日</div>
          <div class="counter__num" id="count-today">0</div>
          <div class="counter__unit">輪</div>
        </div>
        <div class="counter__divider"></div>
        <div class="counter__cell">
          <div class="counter__label">累計</div>
          <div class="counter__num" id="count-total">0</div>
          <div class="counter__unit">輪</div>
        </div>
      </div>
    </header>

    <!-- 注釈：この花が何かを説明する一文。
         通りすがりの人には「花の絵」にしか見えないため、意味を短く示す。
         中央の余白に置くことで、Sakana のタグラインと同じく画面の重心にもなる。 -->
    <div class="note" id="note">
      <p class="note__main">一輪ずつ、来場者のみなさんが咲かせた花です</p>
      <p class="note__sub">園内をめぐって、あなたの一輪も咲かせよう</p>
    </div>

    <!-- デバッグ表示（既定でオフ。D キーで切替） -->
    <div class="debug" id="debug-panel" hidden>
      <div>DEBUG <span id="debug-mode"></span></div>
      <div>last poll: <span id="debug-last"></span></div>
      <div>since id: <span id="debug-since"></span></div>
      <div class="debug__hint">F=花追加 / R=リセット / D=このパネル切替</div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         診断オーバーレイ（7/23 STB実機テスト用）

         OTOMO の STB にはキーボードが無く、D キーでデバッグパネルを
         開けない。テスト用クエリ（?demo=1 等）が付いていれば操作不要で
         常時表示し、画面を撮影するだけで全項目が記録に残るようにする。

         「経過」は読み込みからの秒数。0 に戻れば STB が完全リロードした
         決定的な証拠になり、その周期も実測できる。
    ═══════════════════════════════════════════════════════════ -->
    <div class="diag" id="diag" hidden>
      <div class="diag__title">DIAG — STB TEST</div>
      <div class="diag__grid">
        <span class="diag__k">経過</span>
        <span class="diag__v diag__v--big" id="diag-elapsed">0.0s</span>

        <span class="diag__k">FPS</span>
        <span class="diag__v diag__v--big" id="diag-fps">--</span>

        <span class="diag__k">花数</span>
        <span class="diag__v diag__v--big" id="diag-count">0</span>

        <span class="diag__k">時刻</span>
        <span class="diag__v" id="diag-clock">--:--:--</span>

        <span class="diag__k">読込</span>
        <span class="diag__v" id="diag-loaded">--:--:--</span>

        <span class="diag__k">設定</span>
        <span class="diag__v" id="diag-cfg">-</span>

        <span class="diag__k">画面</span>
        <span class="diag__v" id="diag-screen">-</span>

        <span class="diag__k">poll</span>
        <span class="diag__v" id="diag-poll">0</span>

        <span class="diag__k">UA</span>
        <span class="diag__v diag__v--ua" id="diag-ua">-</span>
      </div>
    </div>
  </div>

  <script src="config.js?v=28"></script>
  <script src="js/api.js?v=28"></script>
  <script src="js/scene.js?v=28"></script>
  <script src="js/bloom.js?v=28"></script>
  <script src="js/main.js?v=28"></script>
</body>
</html>
