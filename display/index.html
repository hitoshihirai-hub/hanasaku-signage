<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなで咲かす未来の街</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/display.css?v=3">
</head>
<body>
  <div class="stage" id="stage">

    <!-- 背景 SVG（Sakana風：ほぼ白の余白＋細い線画の街） -->
    <svg class="scene" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice" aria-hidden="true">

      <!-- ほぼ白の地（わずかに暖色） -->
      <rect x="0" y="0" width="1080" height="1920" fill="#FCFBF7"/>

      <!-- 太陽（細い輪郭のみ・ごく淡く） -->
      <circle cx="852" cy="308" r="104" fill="none" stroke="#ECE4D2" stroke-width="4"/>

      <!-- 一般の街並み（細い線画。塗りなし） -->
      <g fill="none" stroke="#CDC9BD" stroke-width="3"
         stroke-linejoin="round" stroke-linecap="round">
        <path d="M0,1600 L120,1600 L120,1552 L212,1552 L212,1596 L300,1596
                 L300,1526 L392,1526 L392,1584 L470,1584 L470,1544 L556,1544
                 L556,1592 L648,1592 L648,1552 L740,1552 L740,1600 L1080,1600"/>
      </g>

      <!-- 大阪城（線画。下端が街並みベースに揃うよう平行移動） -->
      <g class="landmark landmark-castle" transform="translate(0,182)"
         fill="none" stroke="#BDB6A6" stroke-width="3" stroke-linejoin="round">
        <path d="M130,1420 L165,1330 L235,1330 L270,1420 Z"/>
        <rect x="170" y="1306" width="60" height="24"/>
        <path d="M155,1306 L168,1296 L168,1292 L232,1292 L232,1296 L245,1306 Z"/>
        <rect x="178" y="1276" width="44" height="16"/>
        <path d="M166,1276 L177,1267 L177,1264 L223,1264 L223,1267 L234,1276 Z"/>
        <rect x="186" y="1252" width="28" height="12"/>
        <path d="M177,1252 L185,1244 L185,1241 L215,1241 L215,1244 L223,1252 Z"/>
        <rect x="192" y="1232" width="16" height="9"/>
        <path d="M186,1232 L191,1226 L191,1224 L209,1224 L209,1226 L214,1232 Z"/>
      </g>

      <!-- 通天閣（線画。同上） -->
      <g class="landmark landmark-tower" transform="translate(0,182)"
         fill="none" stroke="#BDB6A6" stroke-width="3" stroke-linejoin="round">
        <rect x="825" y="1360" width="120" height="60"/>
        <path d="M848,1360 L860,1270 L900,1270 L912,1360 Z"/>
        <rect x="852" y="1262" width="56" height="10"/>
        <path d="M866,1262 L872,1210 L888,1210 L894,1262 Z"/>
        <rect x="854" y="1190" width="52" height="22"/>
        <path d="M850,1190 L862,1182 L898,1182 L910,1190 Z"/>
        <rect x="875" y="1158" width="10" height="24"/>
        <circle cx="880" cy="1155" r="5"/>
        <rect x="878" y="1130" width="4" height="24"/>
      </g>

      <!-- 地平線（細い1本） -->
      <line x1="0" y1="1602" x2="1080" y2="1602" stroke="#E4E0D4" stroke-width="2"/>
    </svg>

    <!-- 花レイヤー（SVG。動的に花を追加） -->
    <svg class="flowers" id="flowers-layer" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <!-- 花びら用グラデーション（中心=明るい、外縁=暗い）-->
        <radialGradient id="fg-pink"   cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFEAF3"/><stop offset="100%" stop-color="#C0356A"/></radialGradient>
        <radialGradient id="fg-yellow" cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFFBD0"/><stop offset="100%" stop-color="#C08010"/></radialGradient>
        <radialGradient id="fg-white"  cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFFFFF"/><stop offset="100%" stop-color="#C8A860"/></radialGradient>
        <radialGradient id="fg-purple" cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#F2E6FF"/><stop offset="100%" stop-color="#6030A8"/></radialGradient>
        <radialGradient id="fg-red"    cx="38%" cy="30%" r="75%"><stop offset="0%"   stop-color="#FFE0D8"/><stop offset="100%" stop-color="#A81818"/></radialGradient>
        <!-- 花芯用グラデーション -->
        <radialGradient id="fg-center" cx="40%" cy="35%" r="70%"><stop offset="0%"   stop-color="#FFFCC0"/><stop offset="70%"  stop-color="#E8C020"/><stop offset="100%" stop-color="#A07010"/></radialGradient>
        <!-- 花びら内側の光沢ライン（白半透明） -->
        <linearGradient id="fg-shine"  x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
      </defs>
      <g id="flowers-root"></g>
    </svg>

    <!-- カウンタ -->
    <header class="counter" id="counter">
      <div class="counter__title">みんなで咲かす未来の街</div>
      <div class="counter__row">
        <div class="counter__cell">
          <div class="counter__label">本日</div>
          <div class="counter__num" id="count-today">0</div>
          <div class="counter__unit">輪</div>
        </div>
        <div class="counter__divider"></div>
        <div class="counter__cell">
          <div class="counter__label">累計</div>
          <div class="counter__num" id="count-total">0</div>
          <div class="counter__unit">輪</div>
        </div>
      </div>
    </header>

    <!-- デバッグ表示（既定でオフ。D キーで切替） -->
    <div class="debug" id="debug-panel" hidden>
      <div>DEBUG <span id="debug-mode"></span></div>
      <div>last poll: <span id="debug-last"></span></div>
      <div>since id: <span id="debug-since"></span></div>
      <div class="debug__hint">F=花追加 / R=リセット / D=このパネル切替</div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         診断オーバーレイ（7/23 STB実機テスト用）

         OTOMO の STB にはキーボードが無く、D キーでデバッグパネルを
         開けない。テスト用クエリ（?demo=1 等）が付いていれば操作不要で
         常時表示し、画面を撮影するだけで全項目が記録に残るようにする。

         「経過」は読み込みからの秒数。0 に戻れば STB が完全リロードした
         決定的な証拠になり、その周期も実測できる。
    ═══════════════════════════════════════════════════════════ -->
    <div class="diag" id="diag" hidden>
      <div class="diag__title">DIAG — STB TEST</div>
      <div class="diag__grid">
        <span class="diag__k">経過</span>
        <span class="diag__v diag__v--big" id="diag-elapsed">0.0s</span>

        <span class="diag__k">FPS</span>
        <span class="diag__v diag__v--big" id="diag-fps">--</span>

        <span class="diag__k">花数</span>
        <span class="diag__v diag__v--big" id="diag-count">0</span>

        <span class="diag__k">時刻</span>
        <span class="diag__v" id="diag-clock">--:--:--</span>

        <span class="diag__k">読込</span>
        <span class="diag__v" id="diag-loaded">--:--:--</span>

        <span class="diag__k">設定</span>
        <span class="diag__v" id="diag-cfg">-</span>

        <span class="diag__k">画面</span>
        <span class="diag__v" id="diag-screen">-</span>

        <span class="diag__k">poll</span>
        <span class="diag__v" id="diag-poll">0</span>

        <span class="diag__k">UA</span>
        <span class="diag__v diag__v--ua" id="diag-ua">-</span>
      </div>
    </div>
  </div>

  <script src="config.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/scene.js?v=3"></script>
  <script src="js/bloom.js?v=3"></script>
  <script src="js/main.js?v=3"></script>
</body>
</html>
